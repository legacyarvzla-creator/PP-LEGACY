<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #ui { 
            position: absolute; z-index: 9999; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 15px 30px; border-radius: 50px; border: none; 
            background: #e91e63; color: white; font-size: 16px; 
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="playButton">VER VIDEO EN PANTALLA COMPLETA</button>
    </div>

    <video id="miVideo" src="./video.mp4" preload="auto" crossorigin="anonymous" webkit-playsinline playsinline></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetEnt" mindar-image-target="targetIndex: 0">
            <a-video id="arVideo" src="#miVideo" width="0.6" height="1" position="0 0 0.1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#playButton");
        const video = document.querySelector("#miVideo");
        const targetEnt = document.querySelector("#targetEnt");

        // Activa el motor de video con el toque del usuario
        btn.addEventListener('click', function() {
            document.querySelector("#ui").style.display = "none";
            video.play();
            video.pause(); 
        });

        // Al detectar la imagen Marvel, dispara el video y la pantalla completa
        targetEnt.addEventListener("targetFound", event => {
            video.play();
            if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            } else if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        });

        // NO agregamos targetLost para que el video siga reproduciéndose libremente
    </script>
</body>
</html>
